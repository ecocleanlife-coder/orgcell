<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orgcell - AI 가족 사진 자동 정리</title>
  <meta name="description" content="서버에 원본 걱정 없이, 브라우저 내장 AI로 가장 안전하게 가족 사진을 정리하고 공유하세요." />
  <meta property="og:title" content="Orgcell - AI 가족 사진 자동 정리" />
  <meta property="og:description" content="서버에 원본 걱정 없이, 브라우저 내장 AI로 가장 안전하게 가족 사진을 정리하고 공유하세요." />
  <meta property="og:image" content="/pwa-512x512.png" />
  <meta property="og:type" content="website" />
  <!-- Kakao JavaScript SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>

  <!-- Antigravity WASM Context -->
  <script src="/wasm_exec.js"></script>
  <script>
    if (typeof Go !== 'undefined') {
      const go = new Go();
      // Ensure Vite or the server serves antigravity.wasm correctly
      fetch("/antigravity.wasm").then(response =>
        response.arrayBuffer()
      ).then(bytes =>
        WebAssembly.instantiate(bytes, go.importObject)
      ).then(result => {
        go.run(result.instance);
      }).catch(err => {
        console.warn("WASM Init Error:", err);
      });
    }
  </script>

  <script>
    // Clear stale service worker caches only on version mismatch
    if ('serviceWorker' in navigator) {
      var BUILD_VERSION = '__BUILD_VERSION__';
      var storedVersion = localStorage.getItem('orgcell_build_version');
      if (storedVersion && storedVersion !== BUILD_VERSION) {
        caches.keys().then(function (names) {
          for (var name of names) caches.delete(name);
        });
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (var reg of registrations) reg.unregister();
        });
      }
      localStorage.setItem('orgcell_build_version', BUILD_VERSION);
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
