name: Deploy Orgcell to Production EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_BACKEND: orgcell/backend
  ECR_FRONTEND: orgcell/frontend

jobs:
  # ── 사전 안전 검증 (포트 충돌, nginx 중지 방지) ──────────────
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Block dangerous port bindings (80/443)
        run: |
          echo "=== 포트 바인딩 안전 검사 ==="
          FAILED=0

          # docker-compose.yml에서 80:80, 443:443, 0.0.0.0:80 등 검사
          if grep -rn '"80:80"\|"443:443"\|"80:"\|":443"\|0\.0\.0\.0:80\|0\.0\.0\.0:443' docker-compose.yml 2>/dev/null; then
            echo "❌ BLOCKED: docker-compose.yml에 80/443 포트 바인딩 발견"
            FAILED=1
          fi

          # deploy.yml 내 동적 생성 docker-compose에서도 검사 (8081:80은 허용)
          # safety-check 자체 라인 제외 (grep -v 'grep\|검사')
          if grep -n '"80:80"\|"443:443"' .github/workflows/deploy.yml 2>/dev/null | grep -v 'grep\|검사' | grep -q .; then
            echo "❌ BLOCKED: deploy.yml에 80/443 직접 바인딩 발견"
            FAILED=1
          fi

          # systemctl stop nginx 검사 (safety-check 자체 라인 제외)
          if grep -n 'systemctl stop nginx\|systemctl disable nginx\|fuser.*80/tcp\|fuser.*443/tcp' .github/workflows/deploy.yml 2>/dev/null | grep -v 'grep\|검사' | grep -q .; then
            echo "❌ BLOCKED: deploy.yml에서 호스트 nginx 중지 시도 발견"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "============================================"
            echo "🚫 배포 차단: 포트 충돌 또는 nginx 중지 위험"
            echo "   Docker는 8081:80만 허용됩니다."
            echo "   호스트 nginx를 절대 중지하면 안 됩니다."
            echo "============================================"
            exit 1
          fi

          echo "✅ 안전 검사 통과 — 80/443 충돌 없음"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: safety-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/backend
          FRONTEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/frontend
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,RESEND_API_KEY
          script: |
            # ECR login
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            mkdir -p /opt/orgcell
            cd /opt/orgcell

            # ── Ensure /opt/orgcell/.env has correct values ──────────────
            ENV_FILE=/opt/orgcell/.env
            touch "$ENV_FILE"

            upsert_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            # Google OAuth — client ID is public (matches frontend)
            upsert_env GOOGLE_CLIENT_ID "809838908643-qs0s8d0reiggvon6ohmk3ak6r7l7aniv.apps.googleusercontent.com"

            # Stripe keys (from GitHub Secrets)
            [ -n "$STRIPE_SECRET_KEY" ]      && upsert_env STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
            [ -n "$STRIPE_WEBHOOK_SECRET" ]  && upsert_env STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"

            # Resend email API key
            [ -n "$RESEND_API_KEY" ]         && upsert_env RESEND_API_KEY "$RESEND_API_KEY"

            # Microsoft OneDrive (Azure AD)
            [ -n "$MICROSOFT_CLIENT_ID" ]     && upsert_env MICROSOFT_CLIENT_ID "$MICROSOFT_CLIENT_ID"
            [ -n "$MICROSOFT_CLIENT_SECRET" ] && upsert_env MICROSOFT_CLIENT_SECRET "$MICROSOFT_CLIENT_SECRET"
            [ -n "$MICROSOFT_TENANT_ID" ]     && upsert_env MICROSOFT_TENANT_ID "$MICROSOFT_TENANT_ID"

            echo "✅ /opt/orgcell/.env env keys:"
            grep -o "^[^=]*" "$ENV_FILE" | sort
            # ─────────────────────────────────────────────────────────────

            # SSL은 호스트 nginx가 처리 (/etc/nginx/conf.d/orgcell.conf)
            # orgcell-frontend는 8081 포트로 정적 파일만 서빙

            # Generate docker-compose.yml
            cat > docker-compose.yml <<EOF
            services:
              backend:
                image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-backend
                restart: unless-stopped
                expose:
                  - "5001"
                env_file:
                  - .env
                environment:
                  - NODE_ENV=production
                  - PORT=5001
                  - DATABASE_URL=postgresql://orgcell_user:\${DB_PASSWORD}@orgcell-db:5432/orgcell
                  - FRONTEND_URL=https://orgcell.com
                depends_on:
                  orgcell-db:
                    condition: service_healthy
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
                  interval: 30s
                  timeout: 5s
                  start_period: 15s
                  retries: 3
              frontend:
                image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-frontend
                restart: unless-stopped
                ports:
                  - "8081:80"
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - orgcell-network
              orgcell-db:
                image: postgres:16-alpine
                container_name: orgcell-db
                restart: unless-stopped
                environment:
                  - POSTGRES_DB=orgcell
                  - POSTGRES_USER=orgcell_user
                  - POSTGRES_PASSWORD=\${DB_PASSWORD}
                volumes:
                  - orgcell-pgdata:/var/lib/postgresql/data
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U orgcell_user -d orgcell"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
            volumes:
              orgcell-pgdata:
            networks:
              orgcell-network:
                driver: bridge
            EOF

            # CRITICAL: 절대 호스트 nginx를 중지하지 않음 (80/443은 호스트 nginx가 관리)
            # orgcell-frontend는 8081 포트만 사용, 호스트 nginx가 리버스 프록시

            # Stop existing containers cleanly before recreating
            docker-compose down --remove-orphans || true
            docker rm -f orgcell-frontend orgcell-backend orgcell-db 2>/dev/null || true

            # Deploy
            docker-compose pull
            docker-compose up -d
            docker image prune -f

            # 배포 후 호스트 nginx 상태 확인 (반드시 active 여야 함)
            echo "=== Host nginx status ==="
            sudo systemctl status nginx --no-pager | head -5
            sudo systemctl is-active nginx || (echo "CRITICAL: Host nginx is DOWN! Starting..." && sudo systemctl start nginx)

            # ── Run DB migrations (idempotent — safe to run every deploy) ──
            echo "Running DB migrations..."
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS domains (id SERIAL PRIMARY KEY, subdomain VARCHAR(255) UNIQUE NOT NULL, admin_key VARCHAR(50) UNIQUE NOT NULL, user_id INTEGER, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_domains_subdomain ON domains(subdomain);" \
              -c "CREATE INDEX IF NOT EXISTS idx_domains_admin_key ON domains(admin_key);"
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS families (id SERIAL PRIMARY KEY, name VARCHAR(255) NOT NULL DEFAULT 'My Family', admin_user_id INTEGER NOT NULL REFERENCES users(id), admin_key VARCHAR(50) UNIQUE NOT NULL, subdomain VARCHAR(255) UNIQUE, google_drive_token TEXT, plan VARCHAR(20) DEFAULT 'basic', status VARCHAR(20) DEFAULT 'active', created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS family_id INTEGER REFERENCES families(id);" \
              -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS role VARCHAR(20) DEFAULT 'guest';" \
              -c "CREATE INDEX IF NOT EXISTS idx_families_admin_key ON families(admin_key);" \
              -c "CREATE INDEX IF NOT EXISTS idx_families_subdomain ON families(subdomain);" \
              -c "CREATE INDEX IF NOT EXISTS idx_users_family_id ON users(family_id);" \
              -c "CREATE TABLE IF NOT EXISTS subscriptions (id SERIAL PRIMARY KEY, email VARCHAR(255) NOT NULL, stripe_session_id VARCHAR(255) UNIQUE, amount_usd INTEGER, status VARCHAR(50) DEFAULT 'active', created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_subscriptions_email ON subscriptions(email);" \
              -c "CREATE TABLE IF NOT EXISTS referral_codes (id SERIAL PRIMARY KEY, code VARCHAR(50) UNIQUE NOT NULL, created_by VARCHAR(255), used_by VARCHAR(255), used_at TIMESTAMPTZ, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_referral_codes_code ON referral_codes(code);" \
              -c "CREATE INDEX IF NOT EXISTS idx_referral_codes_used_by ON referral_codes(used_by);"
            # ── 001: family_sites (site controller) ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS family_sites (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL REFERENCES users(id), subdomain VARCHAR(50) UNIQUE NOT NULL, theme VARCHAR(20) DEFAULT 'modern', status VARCHAR(20) DEFAULT 'pending', photo_limit INTEGER DEFAULT 2000, plan_years INTEGER DEFAULT 1, stripe_subscription_id VARCHAR(255), created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_family_sites_subdomain ON family_sites(subdomain);"
            # ── 009: exhibitions, guestbooks, board_posts, board_comments ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS exhibitions (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, title VARCHAR(255) NOT NULL, description TEXT, visibility VARCHAR(20) NOT NULL DEFAULT 'family' CHECK (visibility IN ('public','family')), cover_photo TEXT, photo_count INTEGER DEFAULT 0, created_by INTEGER REFERENCES users(id), created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_exhibitions_site_id ON exhibitions(site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_exhibitions_visibility ON exhibitions(visibility);" \
              -c "CREATE TABLE IF NOT EXISTS guestbooks (id SERIAL PRIMARY KEY, exhibition_id INTEGER NOT NULL REFERENCES exhibitions(id) ON DELETE CASCADE, name VARCHAR(100) NOT NULL, message TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_guestbooks_exhibition_id ON guestbooks(exhibition_id);" \
              -c "CREATE TABLE IF NOT EXISTS board_posts (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, category VARCHAR(50) NOT NULL DEFAULT 'daily' CHECK (category IN ('notice','daily','event','memory')), title VARCHAR(255) NOT NULL, content TEXT NOT NULL, author_id INTEGER REFERENCES users(id), author_name VARCHAR(100), comment_count INTEGER DEFAULT 0, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_board_posts_site_id ON board_posts(site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_board_posts_category ON board_posts(category);" \
              -c "CREATE TABLE IF NOT EXISTS board_comments (id SERIAL PRIMARY KEY, post_id INTEGER NOT NULL REFERENCES board_posts(id) ON DELETE CASCADE, author_id INTEGER REFERENCES users(id), author_name VARCHAR(100), content TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_board_comments_post_id ON board_comments(post_id);"
            # ── 010: exhibition_photos ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS exhibition_photos (id SERIAL PRIMARY KEY, exhibition_id INTEGER NOT NULL REFERENCES exhibitions(id) ON DELETE CASCADE, uploaded_by INTEGER REFERENCES users(id), filename TEXT NOT NULL, original_name TEXT, mime_type VARCHAR(100), file_size INTEGER, width INTEGER, height INTEGER, visibility VARCHAR(20) NOT NULL DEFAULT 'private' CHECK (visibility IN ('public','family','private')), is_cover BOOLEAN DEFAULT FALSE, url TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_exhibition_photos_exhibition_id ON exhibition_photos(exhibition_id);" \
              -c "CREATE UNIQUE INDEX IF NOT EXISTS idx_exhibition_photos_cover ON exhibition_photos(exhibition_id) WHERE is_cover = TRUE;"
            # ── 011: site_members, family_invites ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS site_members (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, role VARCHAR(20) DEFAULT 'member', joined_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, UNIQUE(site_id, user_id));" \
              -c "CREATE INDEX IF NOT EXISTS idx_site_members_site_id ON site_members(site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_site_members_user_id ON site_members(user_id);" \
              -c "CREATE TABLE IF NOT EXISTS family_invites (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, code VARCHAR(20) UNIQUE NOT NULL, email VARCHAR(255), inviter_id INTEGER REFERENCES users(id), status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending','accepted')), created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, expires_at TIMESTAMPTZ DEFAULT (CURRENT_TIMESTAMP + INTERVAL '7 days'));" \
              -c "CREATE INDEX IF NOT EXISTS idx_family_invites_code ON family_invites(code);" \
              -c "CREATE INDEX IF NOT EXISTS idx_family_invites_site_id ON family_invites(site_id);"
            # ── 011b: site_folders, site_media ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS site_folders (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, name VARCHAR(100) NOT NULL, label VARCHAR(100), parent_id INTEGER REFERENCES site_folders(id), is_shared BOOLEAN DEFAULT false, password_hash VARCHAR(255), cover_photo_url TEXT, sort_order INTEGER DEFAULT 0, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_site_folders_site ON site_folders(site_id);" \
              -c "CREATE TABLE IF NOT EXISTS site_media (id SERIAL PRIMARY KEY, folder_id INTEGER NOT NULL REFERENCES site_folders(id) ON DELETE CASCADE, filename VARCHAR(255) NOT NULL, media_type VARCHAR(20) DEFAULT 'photo', file_size BIGINT, drive_file_id VARCHAR(255), thumbnail_url TEXT, title VARCHAR(255), sort_order INTEGER DEFAULT 0, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_site_media_folder ON site_media(folder_id);"
            # ── 012: persons (family tree) ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS persons (id SERIAL PRIMARY KEY, site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE, name VARCHAR(100) NOT NULL, birth_year INTEGER, death_year INTEGER, gender VARCHAR(10), privacy_level VARCHAR(20) DEFAULT 'family', parent1_id INTEGER REFERENCES persons(id) ON DELETE SET NULL, parent2_id INTEGER REFERENCES persons(id) ON DELETE SET NULL, spouse_id INTEGER REFERENCES persons(id) ON DELETE SET NULL, generation INTEGER DEFAULT 0, photo_url TEXT, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_persons_site_id ON persons(site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_persons_parent1 ON persons(parent1_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_persons_parent2 ON persons(parent2_id);"
            # ── 014: calendar end_date for multi-day events ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "ALTER TABLE family_calendar ADD COLUMN IF NOT EXISTS end_date DATE DEFAULT NULL;"
            # ── 013: persons birth_date, death_date ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "ALTER TABLE persons ADD COLUMN IF NOT EXISTS birth_date DATE;" \
              -c "ALTER TABLE persons ADD COLUMN IF NOT EXISTS death_date DATE;"
            # ── 015: OneDrive token ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS onedrive_token JSONB DEFAULT NULL;"
            # ── 016: person_relations (복잡한 가족 관계) ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS person_relations (
                id SERIAL PRIMARY KEY,
                site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE,
                person1_id INTEGER NOT NULL REFERENCES persons(id) ON DELETE CASCADE,
                person2_id INTEGER NOT NULL REFERENCES persons(id) ON DELETE CASCADE,
                relation_type VARCHAR(30) NOT NULL,
                label VARCHAR(100),
                created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
                CONSTRAINT uq_person_relation UNIQUE (site_id, person1_id, person2_id, relation_type)
              );" \
              -c "CREATE INDEX IF NOT EXISTS idx_person_relations_site ON person_relations(site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_person_relations_p1 ON person_relations(person1_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_person_relations_p2 ON person_relations(person2_id);"
            # ── 017: federation (웜홀 라우팅) ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS domain_public_keys (
                id SERIAL PRIMARY KEY,
                domain VARCHAR(255) UNIQUE NOT NULL,
                site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE,
                public_key TEXT NOT NULL,
                private_key_encrypted TEXT NOT NULL,
                created_at TIMESTAMPTZ DEFAULT NOW()
              );" \
              -c "CREATE INDEX IF NOT EXISTS idx_domain_public_keys_domain ON domain_public_keys(domain);" \
              -c "CREATE TABLE IF NOT EXISTS federation_requests (
                id SERIAL PRIMARY KEY,
                source_site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE,
                target_site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE,
                source_domain VARCHAR(255) NOT NULL,
                target_domain VARCHAR(255) NOT NULL,
                source_node_id INTEGER REFERENCES persons(id) ON DELETE SET NULL,
                target_node_id INTEGER REFERENCES persons(id) ON DELETE SET NULL,
                relation_type VARCHAR(50) NOT NULL CHECK (relation_type IN ('direct','collateral','spouse')),
                source_public_key TEXT NOT NULL,
                target_public_key TEXT,
                status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending','accepted','rejected')),
                agreed_scope JSONB DEFAULT '[]',
                nonce_cache JSONB DEFAULT '[]',
                requester_id INTEGER NOT NULL REFERENCES users(id),
                responder_id INTEGER REFERENCES users(id),
                created_at TIMESTAMPTZ DEFAULT NOW(),
                updated_at TIMESTAMPTZ DEFAULT NOW()
              );" \
              -c "CREATE INDEX IF NOT EXISTS idx_federation_source ON federation_requests(source_site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_federation_target ON federation_requests(target_site_id);" \
              -c "CREATE INDEX IF NOT EXISTS idx_federation_status ON federation_requests(status);"
            # ── 018: exhibitions에 person_id, featured_photos, biography 추가 ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "ALTER TABLE exhibitions ADD COLUMN IF NOT EXISTS person_id INTEGER REFERENCES persons(id) ON DELETE SET NULL;" \
              -c "ALTER TABLE exhibitions ADD COLUMN IF NOT EXISTS featured_photos JSONB DEFAULT '[]';" \
              -c "ALTER TABLE exhibitions ADD COLUMN IF NOT EXISTS biography TEXT;" \
              -c "CREATE INDEX IF NOT EXISTS idx_exhibitions_person_id ON exhibitions(person_id);"
            # ── 019: digital_heritage (디지털 유산 승계) ──
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS digital_heritage (
                id SERIAL PRIMARY KEY,
                site_id INTEGER NOT NULL REFERENCES family_sites(id) ON DELETE CASCADE,
                beneficiary_name VARCHAR(100) NOT NULL,
                beneficiary_email VARCHAR(255) NOT NULL,
                beneficiary_relation VARCHAR(50),
                activation_condition VARCHAR(50) DEFAULT 'inactivity_1year',
                is_active BOOLEAN DEFAULT false,
                activated_at TIMESTAMPTZ,
                created_by INTEGER REFERENCES users(id),
                created_at TIMESTAMPTZ DEFAULT NOW(),
                updated_at TIMESTAMPTZ DEFAULT NOW()
              );" \
              -c "CREATE INDEX IF NOT EXISTS idx_digital_heritage_site ON digital_heritage(site_id);"
            echo "Migrations done"
            # ─────────────────────────────────────────────────────────────

            # ── 배포 후 검증 ───────────────────────────────────
            echo "=== 배포 후 검증 시작 (30초 대기) ==="
            sleep 30

            # 1. 컨테이너 상태 확인
            echo "--- Docker 컨테이너 상태 ---"
            docker-compose ps
            FRONTEND_UP=$(docker inspect -f '{{.State.Running}}' orgcell-frontend 2>/dev/null || echo "false")
            BACKEND_UP=$(docker inspect -f '{{.State.Running}}' orgcell-backend 2>/dev/null || echo "false")
            if [ "$FRONTEND_UP" != "true" ] || [ "$BACKEND_UP" != "true" ]; then
              echo "❌ 컨테이너 비정상: frontend=$FRONTEND_UP backend=$BACKEND_UP"
              docker-compose logs --tail=30
              exit 1
            fi
            echo "✅ 컨테이너 정상"

            # 2. 호스트 nginx 상태 확인 + 자동 복구
            echo "--- 호스트 nginx 상태 ---"
            if ! sudo systemctl is-active nginx >/dev/null 2>&1; then
              echo "⚠️ nginx 다운 감지 — 자동 복구 시도"
              # Docker가 80/443 점유했는지 확인
              DOCKER_ON_80=$(sudo ss -tlnp | grep ':80 ' | grep docker || true)
              if [ -n "$DOCKER_ON_80" ]; then
                echo "❌ CRITICAL: Docker가 80/443 점유 중 — 즉시 중지"
                docker-compose down
                exit 1
              fi
              sudo systemctl start nginx
              sleep 2
              if sudo systemctl is-active nginx >/dev/null 2>&1; then
                echo "✅ nginx 복구 완료"
              else
                echo "❌ nginx 복구 실패"
                exit 1
              fi
            else
              echo "✅ 호스트 nginx 정상 (active)"
            fi

            # 3. HTTP 헬스체크
            echo "--- HTTP 헬스체크 ---"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/ || echo "000")
            API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/api/health 2>/dev/null || echo "000")
            echo "Frontend (8081): HTTP $HTTP_CODE"
            echo "Backend API (/api/health): HTTP $API_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️ 프론트엔드 응답 비정상 (HTTP $HTTP_CODE)"
              docker logs orgcell-frontend --tail=20
            fi

            # 4. 포트 점유 최종 확인
            echo "--- 포트 점유 확인 ---"
            sudo ss -tlnp | grep -E ':80 |:443 |:8081 ' || true
            echo "=== 배포 검증 완료 ==="
