            HEALTH_BODY=$(curl -s http://localhost:5001/api/health 2>/dev/null || echo '{"status":"unreachable"}')
            echo "$HEALTH_BODY"
            HEALTH_STATUS=$(echo "$HEALTH_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
            FAILED_ROUTES=$(echo "$HEALTH_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('routes',{}).get('failed',0))" 2>/dev/null || echo "0")
            DB_STATUS=$(echo "$HEALTH_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('db','unknown'))" 2>/dev/null || echo "unknown")

            if [ "$HEALTH_STATUS" = "degraded" ] || [ "$HEALTH_STATUS" = "error" ]; then
              echo "вҡ пёҸ н—¬мҠӨмІҙнҒ¬ л№„м •мғҒ: status=$HEALTH_STATUS, db=$DB_STATUS, failedRoutes=$FAILED_ROUTES"
            else
              echo "вң… н—¬мҠӨмІҙнҒ¬ м •мғҒ: status=$HEALTH_STATUS, db=$DB_STATUS"
            fi

            # 5. Unhealthy м»Ён…Ңмқҙл„Ҳ мһҗлҸҷ мһ¬мӢңмһ‘
            echo "--- Unhealthy м»Ён…Ңмқҙл„Ҳ мһҗлҸҷ мһ¬мӢңмһ‘ ---"
            UNHEALTHY=$(docker ps --filter "health=unhealthy" --filter "name=orgcell" --format "{{.Names}}" 2>/dev/null || true)
            if [ -n "$UNHEALTHY" ]; then
              echo "вҡ пёҸ Unhealthy м»Ён…Ңмқҙл„Ҳ к°җм§Җ: $UNHEALTHY"
              for container in $UNHEALTHY; do
                echo "  вҶ’ $container мһ¬мӢңмһ‘ мӨ‘..."
                docker restart "$container"
              done
              sleep 15
              # мһ¬мӢңмһ‘ нӣ„ мһ¬нҷ•мқё
              STILL_UNHEALTHY=$(docker ps --filter "health=unhealthy" --filter "name=orgcell" --format "{{.Names}}" 2>/dev/null || true)
              if [ -n "$STILL_UNHEALTHY" ]; then
                echo "вқҢ мһ¬мӢңмһ‘ нӣ„м—җлҸ„ unhealthy: $STILL_UNHEALTHY"
                docker logs orgcell-backend --tail=30
              else
                echo "вң… мһҗлҸҷ мһ¬мӢңмһ‘ м„ұкіө вҖ” лӘЁл“  м»Ён…Ңмқҙл„Ҳ healthy"
              fi
            else
              echo "вң… лӘЁл“  м»Ён…Ңмқҙл„Ҳ healthy"
            fi

            # 6. нҸ¬нҠё м җмң  мөңмў… нҷ•мқё
            echo "--- нҸ¬нҠё м җмң  нҷ•мқё ---"
            sudo ss -tlnp | grep -E ':80 |:443 |:8081 ' || true
            echo "=== л°°нҸ¬ кІҖмҰқ мҷ„лЈҢ ==="
