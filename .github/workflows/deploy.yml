name: Deploy Orgcell to Production EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_BACKEND: orgcell/backend
  ECR_FRONTEND: orgcell/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/backend
          FRONTEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/frontend
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET
          script: |
            # ECR login
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            mkdir -p /opt/orgcell
            cd /opt/orgcell

            # ── Ensure /opt/orgcell/.env has correct values ──────────────
            ENV_FILE=/opt/orgcell/.env
            touch "$ENV_FILE"

            upsert_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            # Google OAuth — client ID is public (matches frontend)
            upsert_env GOOGLE_CLIENT_ID "809838908643-qs0s8d0reiggvon6ohmk3ak6r7l7aniv.apps.googleusercontent.com"

            # Stripe keys (from GitHub Secrets)
            [ -n "$STRIPE_SECRET_KEY" ]      && upsert_env STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
            [ -n "$STRIPE_WEBHOOK_SECRET" ]  && upsert_env STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"

            echo "✅ /opt/orgcell/.env env keys:"
            grep -o "^[^=]*" "$ENV_FILE" | sort
            # ─────────────────────────────────────────────────────────────

            # Generate nginx SSL config (preserved across deploys)
            cat > nginx-ssl.conf <<'NGINXEOF'
            server {
                listen 80;
                server_name orgcell.com www.orgcell.com;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name orgcell.com www.orgcell.com;
                ssl_certificate /etc/letsencrypt/live/orgcell.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/orgcell.com/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                root /usr/share/nginx/html;
                index index.html;

                # Never cache HTML, SW, manifest - always fetch fresh from server
                location ~* ^/(index\.html|sw\.js|registerSW\.js|manifest\.webmanifest)$ {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    add_header Pragma "no-cache";
                    add_header Expires "0";
                    try_files $uri /index.html;
                }

                # Hashed JS/CSS assets - safe to cache forever
                location /assets/ {
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }

                # Default: no cache for SPA fallback
                location / {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    try_files $uri $uri/ /index.html;
                }
                location /api/ {
                    proxy_pass http://orgcell-backend:5001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    client_max_body_size 25M;
                }
                location /socket.io/ {
                    proxy_pass http://orgcell-backend:5001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NGINXEOF

            # Generate docker-compose.yml with SSL
            cat > docker-compose.yml <<EOF
            services:
              backend:
                image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-backend
                restart: unless-stopped
                expose:
                  - "5001"
                env_file:
                  - .env
                environment:
                  - NODE_ENV=production
                  - PORT=5001
                  - DATABASE_URL=postgresql://orgcell_user:\${DB_PASSWORD}@orgcell-db:5432/orgcell
                  - FRONTEND_URL=https://orgcell.com
                depends_on:
                  orgcell-db:
                    condition: service_healthy
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
                  interval: 30s
                  timeout: 5s
                  start_period: 15s
                  retries: 3
              frontend:
                image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                  - /opt/orgcell/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - orgcell-network
              orgcell-db:
                image: postgres:16-alpine
                container_name: orgcell-db
                restart: unless-stopped
                environment:
                  - POSTGRES_DB=orgcell
                  - POSTGRES_USER=orgcell_user
                  - POSTGRES_PASSWORD=\${DB_PASSWORD}
                volumes:
                  - orgcell-pgdata:/var/lib/postgresql/data
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U orgcell_user -d orgcell"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
            volumes:
              orgcell-pgdata:
            networks:
              orgcell-network:
                driver: bridge
            EOF

            # Stop host nginx if running (it holds ports 80/443 before Docker can bind them)
            sudo systemctl stop nginx 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 443/tcp 2>/dev/null || true

            # Stop existing containers cleanly to free ports before recreating
            docker-compose down --remove-orphans || true
            docker rm -f orgcell-frontend orgcell-backend orgcell-db 2>/dev/null || true

            # Deploy
            docker-compose pull
            docker-compose up -d
            docker image prune -f

            # ── Run DB migrations (idempotent — safe to run every deploy) ──
            echo "Running DB migrations..."
            docker exec orgcell-db psql -U orgcell_user -d orgcell \
              -c "CREATE TABLE IF NOT EXISTS families (id SERIAL PRIMARY KEY, name VARCHAR(255) NOT NULL DEFAULT 'My Family', admin_user_id INTEGER NOT NULL REFERENCES users(id), admin_key VARCHAR(50) UNIQUE NOT NULL, subdomain VARCHAR(255) UNIQUE, google_drive_token TEXT, plan VARCHAR(20) DEFAULT 'basic', status VARCHAR(20) DEFAULT 'active', created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS family_id INTEGER REFERENCES families(id);" \
              -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS role VARCHAR(20) DEFAULT 'guest';" \
              -c "CREATE INDEX IF NOT EXISTS idx_families_admin_key ON families(admin_key);" \
              -c "CREATE INDEX IF NOT EXISTS idx_families_subdomain ON families(subdomain);" \
              -c "CREATE INDEX IF NOT EXISTS idx_users_family_id ON users(family_id);" \
              -c "CREATE TABLE IF NOT EXISTS subscriptions (id SERIAL PRIMARY KEY, email VARCHAR(255) NOT NULL, stripe_session_id VARCHAR(255) UNIQUE, amount_usd INTEGER, status VARCHAR(50) DEFAULT 'active', created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_subscriptions_email ON subscriptions(email);" \
              -c "CREATE TABLE IF NOT EXISTS referral_codes (id SERIAL PRIMARY KEY, code VARCHAR(50) UNIQUE NOT NULL, created_by VARCHAR(255), used_by VARCHAR(255), used_at TIMESTAMPTZ, created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP);" \
              -c "CREATE INDEX IF NOT EXISTS idx_referral_codes_code ON referral_codes(code);" \
              -c "CREATE INDEX IF NOT EXISTS idx_referral_codes_used_by ON referral_codes(used_by);"
            echo "Migrations done"
            # ─────────────────────────────────────────────────────────────

            # Verify
            sleep 15
            docker-compose ps
