name: Deploy Orgcell to Production EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: ap-northeast-2
  ECR_BACKEND: orgcell/backend
  ECR_FRONTEND: orgcell/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/backend
          FRONTEND_IMAGE: ${{ steps.login-ecr.outputs.registry }}/orgcell/frontend
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            # ECR login
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            mkdir -p /opt/orgcell
            cd /opt/orgcell

            # Generate nginx SSL config (preserved across deploys)
            cat > nginx-ssl.conf <<'NGINXEOF'
            server {
                listen 80;
                server_name orgcell.com www.orgcell.com;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name orgcell.com www.orgcell.com;
                ssl_certificate /etc/letsencrypt/live/orgcell.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/orgcell.com/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                root /usr/share/nginx/html;
                index index.html;

                # Never cache HTML, SW, manifest - always fetch fresh from server
                location ~* ^/(index\.html|sw\.js|registerSW\.js|manifest\.webmanifest)$ {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    add_header Pragma "no-cache";
                    add_header Expires "0";
                    try_files $uri /index.html;
                }

                # Hashed JS/CSS assets - safe to cache forever
                location /assets/ {
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }

                # Default: no cache for SPA fallback
                location / {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    try_files $uri $uri/ /index.html;
                }
                location /api/ {
                    proxy_pass http://orgcell-backend:5001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    client_max_body_size 25M;
                }
                location /socket.io/ {
                    proxy_pass http://orgcell-backend:5001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NGINXEOF

            # Generate docker-compose.yml with SSL
            cat > docker-compose.yml <<EOF
            services:
              backend:
                image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-backend
                restart: unless-stopped
                expose:
                  - "5001"
                env_file:
                  - .env
                environment:
                  - NODE_ENV=production
                  - PORT=5001
                  - DATABASE_URL=postgresql://orgcell_user:\${DB_PASSWORD}@orgcell-db:5432/orgcell
                  - FRONTEND_URL=https://orgcell.com
                depends_on:
                  orgcell-db:
                    condition: service_healthy
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
                  interval: 30s
                  timeout: 5s
                  start_period: 15s
                  retries: 3
              frontend:
                image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
                container_name: orgcell-frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                  - /opt/orgcell/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - orgcell-network
              orgcell-db:
                image: postgres:16-alpine
                container_name: orgcell-db
                restart: unless-stopped
                environment:
                  - POSTGRES_DB=orgcell
                  - POSTGRES_USER=orgcell_user
                  - POSTGRES_PASSWORD=\${DB_PASSWORD}
                volumes:
                  - orgcell-pgdata:/var/lib/postgresql/data
                networks:
                  - orgcell-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U orgcell_user -d orgcell"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
            volumes:
              orgcell-pgdata:
            networks:
              orgcell-network:
                driver: bridge
            EOF

            # Deploy
            docker-compose pull
            docker-compose up -d --force-recreate
            docker image prune -f

            # Verify
            sleep 10
            docker-compose ps
